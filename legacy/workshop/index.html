<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>工房 — Karakuri</title>
<meta name="description" content="ベルトと機械をつないで、データの流れを設計する。遊んでいるうちにmap・filter・分岐・並行処理が身につく、ブラウザ完結のCSパズル。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/workshop.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%230b0e13'/%3E%3Cpath d='M16 6v4M16 22v4M6 16h4M22 16h4' stroke='%23d8a657' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='4' fill='none' stroke='%23d8a657' stroke-width='2'/%3E%3C/svg%3E">
</head>
<body>

<header class="site-head">
  <div class="wrap site-head__inner">
    <a class="brand" href="../">
      <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="16" cy="16" r="14" fill="none" stroke="var(--brass)" stroke-width="1" opacity="0.4"/>
        <path d="M16 5v4M16 23v4M5 16h4M23 16h4M9 9l3 3M20 20l3 3M23 9l-3 3M12 20l-3 3" stroke="var(--brass)" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="16" cy="16" r="4.5" fill="none" stroke="var(--brass)" stroke-width="1.6"/>
      </svg>
      <span>Karakuri</span>
    </a>
    <nav class="nav">
      <a class="nav__hide" href="../playground/">遊び場</a>
      <a class="nav__hide" href="../learn/">読み解き</a>
      <a class="nav__cta" href="../">← ホーム</a>
    </nav>
  </div>
</header>

<main class="ws">
  <!-- LEFT RAIL -->
  <aside class="ws__rail">
    <div>
      <div class="lvl-head">
        <span class="lvl-head__no" id="lvl-no">課題 01</span>
      </div>
      <div class="lvl-head"><h1 id="lvl-title">—</h1></div>
      <div class="lvl-concept"><span class="pill" id="lvl-concept">—</span></div>
    </div>

    <p class="lvl-brief" id="lvl-brief">—</p>

    <div class="lvl-idea">
      <b>考え方</b>
      <span id="lvl-idea">—</span>
    </div>

    <div>
      <div class="rail-label">部品（パレット）</div>
      <div class="palette" id="palette"></div>
    </div>

    <div class="goal" id="goal">
      <div class="goal__label" id="goal-label">—</div>
      <div class="goal__detail" id="goal-detail">まだ動かしていません</div>
    </div>

    <details class="hint">
      <summary>ヒントを見る</summary>
      <p id="lvl-hint">—</p>
    </details>
  </aside>

  <!-- STAGE -->
  <section class="ws__stage">
    <div class="toolbar">
      <div class="toolbar__group">
        <button class="ctrl ctrl--primary" id="btn-run">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l9 5-9 5z"/></svg>
          <span>動かす</span>
        </button>
        <button class="ctrl" id="btn-step" title="1ステップ進める">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l6 5-6 5zM11 3h2v10h-2z"/></svg>
          <span>1歩</span>
        </button>
        <button class="ctrl" id="btn-reset" title="最初から">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 8a5 5 0 1 1-1.5-3.5M13 2v3h-3"/></svg>
          <span>戻す</span>
        </button>
      </div>
      <div class="toolbar__sep"></div>
      <div class="toolbar__group">
        <button class="ctrl" id="btn-speed"><span id="speed-label">速さ ×1</span></button>
      </div>
      <div class="lvlnav">
        <select id="lvl-select" aria-label="課題を選ぶ"></select>
      </div>
    </div>

    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="ws-canvas"></canvas>
      <div class="toast" id="toast">
        <div class="toast__card">
          <span class="kicker">突破</span>
          <h2 id="toast-title">組み上がった！</h2>
          <p id="toast-msg">—</p>
          <div class="hero__cta">
            <button class="btn" id="toast-next">次の課題へ →</button>
            <button class="btn btn--ghost" id="toast-stay">この課題に留まる</button>
          </div>
        </div>
      </div>
    </div>

    <div class="statusbar">
      <span>tick <b id="st-tick">0</b></span>
      <span>流れ中 <b id="st-tokens">0</b></span>
      <span>集めた <b id="st-collected">[]</b></span>
      <span class="msg" id="st-msg"></span>
      <span style="margin-left:auto" class="ws__legend">
        <span class="kbd">クリック</span> 置く/回転 ・ <span class="kbd">右クリック</span> 消す ・ <span class="kbd">R</span> 回転 ・ <span class="kbd">Space</span> 再生
      </span>
    </div>
  </section>
</main>

<script type="module" src="../js/workshop/game.js"></script>
</body>
</html>
